<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBS Builder</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2130;
    --border: #2a3040;
    --border2: #333d55;
    --accent: #4e9af1;
    --accent2: #2d6bc4;
    --green: #3fb68e;
    --red: #e05a5a;
    --yellow: #d4a843;
    --purple: #9b72cf;
    --orange: #d4834a;
    --text: #e2e8f8;
    --muted: #5a6580;
    --muted2: #8892a4;
    --shadow: 0 4px 24px #00000066;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Header ── */
  #header {
    position: sticky; top: 0; z-index: 200;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow);
  }
  #header h1 {
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent); flex-shrink: 0;
  }
  #header .subtitle { font-size: 10px; color: var(--muted2); margin-top: 1px; }
  #header-actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

  .btn {
    padding: 6px 14px; border-radius: 7px; border: 1px solid transparent;
    cursor: pointer; font-size: 12px; font-weight: 600;
    font-family: inherit; transition: all 0.15s; background: transparent;
    white-space: nowrap;
  }
  .btn-accent { border-color: #4e9af155; color: var(--accent); }
  .btn-accent:hover { background: #4e9af122; }
  .btn-green { border-color: #3fb68e55; color: var(--green); }
  .btn-green:hover { background: #3fb68e22; }
  .btn-muted { border-color: #5a658055; color: var(--muted2); }
  .btn-muted:hover { background: #5a658022; }
  .btn-red { border-color: #e05a5a55; color: var(--red); }
  .btn-red:hover { background: #e05a5a22; }

  /* ── Main ── */
  #main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  /* ── Tree ── */
  #tree { min-height: 200px; }
  .empty-state {
    text-align: center; color: var(--muted); margin-top: 60px;
    font-size: 13px; line-height: 2;
  }

  /* ── Node ── */
  .node-row {
    display: flex; align-items: center; gap: 6px;
    border-radius: 8px; padding: 5px 10px;
    border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s;
    cursor: grab; user-select: none; position: relative;
    margin-bottom: 2px;
  }
  .node-row:hover { background: #ffffff08; }
  .node-row.drag-over { border-left-color: var(--accent) !important; background: #4e9af115; }
  .node-row.dragging { opacity: 0.35; }

  .toggle-btn {
    width: 18px; height: 18px; border-radius: 4px;
    background: transparent; border: none; color: var(--muted);
    font-size: 9px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .toggle-btn.has-children { background: var(--border2); }
  .toggle-btn:hover { color: var(--text); }

  .num-badge {
    font-size: 10px; font-family: 'Courier New', monospace;
    border-radius: 4px; padding: 1px 5px; flex-shrink: 0;
    min-width: 28px; text-align: center;
  }
  .level-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  .node-title {
    flex: 1; font-size: 13px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .node-title[contenteditable="true"] {
    outline: 1px solid var(--accent); border-radius: 4px;
    padding: 1px 6px; background: var(--surface);
    white-space: nowrap; min-width: 60px;
  }

  .node-meta {
    display: flex; gap: 4px; align-items: center; flex-shrink: 0;
  }
  .meta-field {
    font-size: 11px; color: var(--muted2);
    border: 1px solid transparent; border-radius: 4px;
    padding: 2px 7px; cursor: pointer; white-space: nowrap;
    transition: border-color 0.12s; min-width: 48px; text-align: center;
  }
  .meta-field:hover { border-color: var(--border2); }
  .meta-field.empty { color: var(--muted); }
  .meta-field input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 11px; font-family: inherit;
    width: 90px; text-align: center;
  }
  .meta-sep { font-size: 10px; color: var(--muted); flex-shrink: 0; }

  .node-actions {
    display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s;
  }
  .node-row:hover .node-actions { opacity: 1; }

  .act-btn {
    width: 20px; height: 20px; border-radius: 4px; border: none;
    background: transparent; color: var(--muted);
    font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.1s; font-family: inherit;
  }
  .act-btn:hover { background: #ffffff18; }
  .act-btn.add:hover { color: var(--green); }
  .act-btn.child:hover { color: var(--accent); }
  .act-btn.del:hover { color: var(--red); }

  /* ── Stats ── */
  #stats {
    margin-top: 28px; padding: 12px 18px;
    background: var(--surface); border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; gap: 28px; font-size: 12px; color: var(--muted2);
  }
  #stats .stat-val { color: var(--text); font-weight: 700; font-size: 17px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #fff;
    border-radius: 8px; padding: 10px 18px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 20px #00000066;
    z-index: 999; display: none;
    animation: fadeUp 0.2s ease;
  }
  #toast.error { background: var(--red); }

  /* ── Template Panel ── */
  #tpl-panel {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: none; gap: 12px; flex-wrap: wrap;
    animation: slideDown 0.2s ease;
  }
  #tpl-panel.open { display: flex; }
  .tpl-card {
    flex: 1; min-width: 180px; max-width: 280px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; padding: 14px 16px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .tpl-card:hover { border-color: var(--accent); background: #4e9af10a; }
  .tpl-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .tpl-card p  { font-size: 11px; color: var(--muted2); line-height: 1.6; }

  /* ── Animations ── */
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:none } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

  /* ── Toolbar separator ── */
  .sep { width: 1px; background: var(--border); height: 20px; flex-shrink: 0; }

</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <h1>⬡ WBS Builder</h1>
    <div class="subtitle">工作分解結構 · 離線版</div>
  </div>
  <div id="header-actions">
    <button class="btn btn-accent" onclick="toggleTpl()">📋 模板</button>
    <div class="sep"></div>
    <button class="btn btn-green" onclick="addRoot()">＋ 新增群組</button>
    <div class="sep"></div>
    <button class="btn btn-muted" onclick="exportCSV()">⬇ CSV/Excel</button>
    <button class="btn btn-muted" onclick="exportJSON()">⬇ JSON</button>
    <button class="btn btn-muted" onclick="importJSON()">⬆ 匯入</button>
  </div>
</div>

<!-- Template Panel -->
<div id="tpl-panel">
  <div class="tpl-card" onclick="applyTemplate('feature')">
    <h3>📋 新功能開發</h3>
    <p>需求分析 → 開發實作<br>→ 環境與防火牆 → 上線準備</p>
  </div>
  <div class="tpl-card" onclick="applyTemplate('system')">
    <h3>🚀 新系統建置</h3>
    <p>需求規劃 → 系統設計 → 開發<br>→ 環境基礎設施 → 驗收 → 上線</p>
  </div>
  <div class="tpl-card" onclick="applyTemplate('project')">
    <h3>🏗 專案交付</h3>
    <p>專案啟動 → 需求 → 規劃 → 執行<br>→ 環境部署 → 交付收尾</p>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="tree"></div>
  <div id="stats">
    <div><span class="stat-val" id="s-total">0</span> 工作項目</div>
    <div><span class="stat-val" id="s-roots">0</span> 主要群組</div>
    <div><span class="stat-val" id="s-depth">0</span> 最大層級</div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Hidden file input for import -->
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ── State ──
const LEVEL_COLORS = ['#4e9af1','#3fb68e','#d4a843','#9b72cf','#d4834a'];

// ── Templates ──
const TEMPLATES = {
  feature: [
    { title: '需求分析', children: [

      { title: '使用者故事', children: [] },
      { title: '驗收標準', children: [] },

    { title: '開發實作', children: [

      { title: '前端開發', children: [] },

    ]},
    { title: '環境與防火牆', children: [

      { title: '主機環境建置', children: [] },
      { title: '開發環境設定', children: [] },
      { title: '測試環境設定', children: [] },

      { title: '回滾計畫', children: [] },

  ],
  system: [

      { title: '需求訪談', children: [] },
      { title: '可行性評估', children: [] },
      { title: '時程規劃', children: [] },
      { title: '資源評估', children: [] },
    ]},
    { title: '系統設計', children: [
      { title: '架構設計', children: [] },
      { title: '資料庫設計', children: [] },
      { title: 'API 設計', children: [] },
      { title: 'UI/UX 設計', children: [] },
    ]},
    { title: '開發實作', children: [
      { title: '前端開發', children: [] },
      { title: '後端開發', children: [] },

    ]},
    { title: '環境與基礎設施', children: [
      { title: '主機申請', children: [] },
      { title: '主機環境建置', children: [] },
      { title: '伺服器建置', children: [] },
      { title: '防火牆規則設定', children: [] },
      { title: '網路設定', children: [] },
      { title: '監控設定', children: [] },
    ]},
    { title: '測試驗收', children: [
      { title: '單元測試', children: [] },
      { title: '整合測試', children: [] },
      { title: '效能測試', children: [] },
      { title: 'UAT', children: [] },
    ]},
    { title: '上線部署', children: [
      { title: '部署計畫', children: [] },
      { title: '資料遷移', children: [] },
      { title: '上線審批', children: [] },

  ],
  project: [
    { title: '專案啟動', children: [

    ]},
    { title: '需求收集', children: [

    ]},
    { title: '規劃', children: [
      { title: 'WBS 建立', children: [] },
      { title: '時程規劃', children: [] },
      { title: '風險評估', children: [] },
      { title: '資源分配', children: [] },
    ]},
    { title: '執行', children: [
      { title: '開發製作', children: [] },
      { title: '進度追蹤', children: [] },
      { title: '品質確保', children: [] },
    ]},
    { title: '環境與部署', children: [
      { title: '主機申請', children: [] },
      { title: '主機環境建置', children: [] },
      { title: '環境準備', children: [] },
      { title: '防火牆設定', children: [] },
      { title: '系統整合測試', children: [] },
    ]},
    { title: '交付與收尾', children: [
      { title: '使用者訓練', children: [] },
      { title: '文件交付', children: [] },
      { title: '上線部署', children: [] },
      { title: '專案結案', children: [] },
    ]},
  ],
};

let tree = [
  { id: uid(), title: '專案規劃', children: [
    { id: uid(), title: '需求訪談', children: [] },
    { id: uid(), title: '時程規劃', children: [] },
    { id: uid(), title: '資源評估', children: [] },
  ]},
  { id: uid(), title: '系統設計', children: [
    { id: uid(), title: '架構設計', children: [
      { id: uid(), title: '前端架構', children: [] },
      { id: uid(), title: '後端架構', children: [] },
      { id: uid(), title: '資料庫設計', children: [] },
    ]},
    { id: uid(), title: 'UI/UX 設計', children: [] },
  ]},
  { id: uid(), title: '開發實作', children: [
    { id: uid(), title: '前端開發', children: [] },
    { id: uid(), title: '後端開發', children: [] },
    { id: uid(), title: 'API 串接', children: [] },
  ]},
  { id: uid(), title: '測試驗收', children: [
    { id: uid(), title: '單元測試', children: [] },
    { id: uid(), title: '整合測試', children: [] },
    { id: uid(), title: '使用者驗收', children: [] },
  ]},
  { id: uid(), title: '部署上線', children: [] },
];

let collapsed = {};
let draggingId = null;
let overId = null;

function uid() { return Math.random().toString(36).slice(2,9); }

// ── Tree utils ──
function flatten(nodes, parentId=null, level=0) {
  const res = [];
  nodes.forEach((n,i) => {
    res.push({ ...n, parentId, level, hasChildren: n.children.length > 0 });
    if (!collapsed[n.id]) res.push(...flatten(n.children, n.id, level+1));
  });
  return res;
}

function allFlat(nodes, level=0) {
  const res = [];
  nodes.forEach(n => {
    res.push({ ...n, level });
    res.push(...allFlat(n.children, level+1));
  });
  return res;
}

function numbering(nodes, prefix='') {
  const map = {};
  nodes.forEach((n,i) => {
    const num = prefix ? `${prefix}.${i+1}` : `${i+1}`;
    map[n.id] = num;
    Object.assign(map, numbering(n.children, num));
  });
  return map;
}

function findNode(nodes, id) {
  for (const n of nodes) {
    if (n.id === id) return n;
    const found = findNode(n.children, id);
    if (found) return found;
  }
  return null;
}

function removeNode(nodes, id) {
  let removed = null;
  const filter = arr => arr.reduce((acc, n) => {
    if (n.id === id) { removed = JSON.parse(JSON.stringify(n)); return acc; }
    acc.push({ ...n, children: filter(n.children) });
    return acc;
  }, []);
  return [filter(nodes), removed];
}

function insertAfter(nodes, targetId, newNode) {
  return nodes.reduce((acc, n) => {
    acc.push({ ...n, children: insertAfter(n.children, targetId, newNode) });
    if (n.id === targetId) acc.push(newNode);
    return acc;
  }, []);
}

function addChildTo(nodes, parentId, newNode) {
  return nodes.map(n => {
    if (n.id === parentId) return { ...n, children: [...n.children, newNode] };
    return { ...n, children: addChildTo(n.children, parentId, newNode) };
  });
}

function updateNodeTitle(nodes, id, title) {
  return nodes.map(n => {
    if (n.id === id) return { ...n, title };
    return { ...n, children: updateNodeTitle(n.children, id, title) };
  });
}

function updateNodeField(nodes, id, field, value) {
  return nodes.map(n => {
    if (n.id === id) return { ...n, [field]: value };
    return { ...n, children: updateNodeField(n.children, id, field, value) };
  });
}

// ── Render ──
function render() {
  const nums = numbering(tree);
  const all = allFlat(tree);
  const vis = flatten(tree);
  const treeEl = document.getElementById('tree');

  if (all.length === 0) {
    treeEl.innerHTML = '<div class="empty-state">尚無工作項目<br>點擊「新增群組」或使用 AI 生成</div>';
  } else {
    treeEl.innerHTML = '';
    vis.forEach(node => {
      const col = LEVEL_COLORS[node.level % LEVEL_COLORS.length];
      const row = document.createElement('div');
      row.className = 'node-row';
      row.dataset.id = node.id;
      row.style.paddingLeft = (12 + node.level * 24) + 'px';
      row.style.borderLeftColor = 'transparent';
      row.draggable = true;

      // Toggle
      const tog = document.createElement('button');
      tog.className = 'toggle-btn' + (node.hasChildren ? ' has-children' : '');
      tog.textContent = node.hasChildren ? (collapsed[node.id] ? '▶' : '▼') : '';
      tog.onclick = e => { e.stopPropagation(); collapsed[node.id] = !collapsed[node.id]; render(); };
      row.appendChild(tog);

      // Number
      const badge = document.createElement('span');
      badge.className = 'num-badge';
      badge.textContent = nums[node.id] || '';
      badge.style.color = col;
      badge.style.background = col + '18';
      row.appendChild(badge);

      // Dot
      const dot = document.createElement('span');
      dot.className = 'level-dot';
      dot.style.background = col;
      dot.style.boxShadow = `0 0 6px ${col}88`;
      row.appendChild(dot);

      // Title
      const title = document.createElement('span');
      title.className = 'node-title';
      title.textContent = node.title;
      title.title = '雙擊編輯';
      title.ondblclick = e => { e.stopPropagation(); startEdit(node.id, title); };
      row.appendChild(title);

      // Meta fields (時間起訖 + 負責人)
      const meta = document.createElement('div');
      meta.className = 'node-meta';

      const mkMeta = (field, placeholder, width) => {
        const el = document.createElement('span');
        el.className = 'meta-field' + (node[field] ? '' : ' empty');
        el.textContent = node[field] || placeholder;
        el.style.minWidth = width;
        el.onclick = e => { e.stopPropagation(); startMetaEdit(node.id, field, el, placeholder); };
        return el;
      };

      meta.appendChild(mkMeta('startDate', '開始', '64px'));
      meta.appendChild(document.createTextNode(' ~ '));
      meta.appendChild(mkMeta('endDate', '結束', '64px'));
      const metaSep = document.createElement('span');
      metaSep.className = 'meta-sep';
      metaSep.textContent = '|';
      meta.appendChild(metaSep);
      meta.appendChild(mkMeta('owner', '負責人', '60px'));
      row.appendChild(meta);

      // Actions
      const acts = document.createElement('div');
      acts.className = 'node-actions';

      const mkBtn = (label, cls, tip, fn) => {
        const b = document.createElement('button');
        b.className = `act-btn ${cls}`;
        b.textContent = label;
        b.title = tip;
        b.onclick = e => { e.stopPropagation(); fn(); };
        return b;
      };

      acts.appendChild(mkBtn('＋','add','新增同層', () => addSibling(node.id)));
      if (node.level < 4) acts.appendChild(mkBtn('⤵','child','新增子項', () => addChildNode(node.id)));
      acts.appendChild(mkBtn('✕','del','刪除', () => deleteNode(node.id)));
      row.appendChild(acts);

      // Drag events
      row.addEventListener('dragstart', e => {
        draggingId = node.id;
        setTimeout(() => row.classList.add('dragging'), 0);
      });
      row.addEventListener('dragend', () => {
        draggingId = null; overId = null;
        document.querySelectorAll('.drag-over,.dragging').forEach(el => {
          el.classList.remove('drag-over','dragging');
        });
      });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        if (draggingId === node.id) return;
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        row.classList.add('drag-over');
        overId = node.id;
      });
      row.addEventListener('drop', e => {
        e.preventDefault();
        if (!draggingId || draggingId === node.id) return;
        const [without, moved] = removeNode(tree, draggingId);
        if (moved) tree = insertAfter(without, node.id, moved);
        draggingId = null; overId = null;
        render();
      });

      treeEl.appendChild(row);
    });
  }

  // Stats
  const allNodes = allFlat(tree);
  document.getElementById('s-total').textContent = allNodes.length;
  document.getElementById('s-roots').textContent = tree.length;
  const maxDepth = allNodes.length ? Math.max(...allNodes.map(n => n.level)) + 1 : 0;
  document.getElementById('s-depth').textContent = maxDepth;
}

// ── Edit ──
function startMetaEdit(id, field, el, placeholder) {
  const prev = el.textContent === placeholder ? '' : el.textContent;
  el.classList.remove('empty');
  el.innerHTML = '';
  const inp = document.createElement('input');
  inp.value = prev;
  inp.placeholder = placeholder;
  inp.style.width = el.style.minWidth;
  el.appendChild(inp);
  inp.focus();
  inp.select();
  const commit = () => {
    const val = inp.value.trim();
    tree = updateNodeField(tree, id, field, val);
    el.textContent = val || placeholder;
    el.className = 'meta-field' + (val ? '' : ' empty');
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = prev; inp.blur(); }
  });
}

function startEdit(id, titleEl) {
  titleEl.contentEditable = 'true';
  titleEl.focus();
  // select all
  const range = document.createRange();
  range.selectNodeContents(titleEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  const commit = () => {
    titleEl.contentEditable = 'false';
    const val = titleEl.textContent.trim();
    if (val) tree = updateNodeTitle(tree, id, val);
    else { const n = findNode(tree, id); if (n) titleEl.textContent = n.title; }
    titleEl.removeEventListener('blur', commit);
    titleEl.removeEventListener('keydown', onKey);
  };
  const onKey = e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { titleEl.contentEditable='false'; const n=findNode(tree,id); if(n) titleEl.textContent=n.title; }
  };
  titleEl.addEventListener('blur', commit);
  titleEl.addEventListener('keydown', onKey);
}

// ── Templates ──
function toggleTpl() {
  document.getElementById('tpl-panel').classList.toggle('open');
}

function applyTemplate(key) {
  if (!confirm('套用模板將取代現有 WBS，確定繼續？')) return;
  tree = injectIds(TEMPLATES[key]);
  collapsed = {};
  document.getElementById('tpl-panel').classList.remove('open');
  render();
  showToast('模板已套用 ✓');
}

// ── CRUD ──
function addRoot() {
  tree.push({ id: uid(), title: '新工作群組', children: [] });
  render();
}

function addSibling(id) {
  tree = insertAfter(tree, id, { id: uid(), title: '新工作項目', children: [] });
  render();
}

function addChildNode(parentId) {
  tree = addChildTo(tree, parentId, { id: uid(), title: '新子項目', children: [] });
  collapsed[parentId] = false;
  render();
}

function deleteNode(id) {
  const [nt] = removeNode(tree, id);
  tree = nt;
  render();
}

function injectIds(nodes, level=0) {
  return (nodes||[]).map(n => ({
    id: uid(), title: n.title || '未命名',
    owner: n.owner || '', startDate: n.startDate || '', endDate: n.endDate || '',
    children: injectIds(n.children, level+1)
  }));
}

// ── Export ──
function exportJSON() {
  const blob = new Blob([JSON.stringify(tree, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='wbs.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('JSON 已匯出');
}

function exportCSV() {
  const nums = numbering(tree);
  const rows = [['編號','層級','工作項目','負責人','開始日期','結束日期']];
  const walk = (nodes, level=0) => nodes.forEach(n => {
    rows.push([nums[n.id], level+1, n.title, n.owner||'', n.startDate||'', n.endDate||'']);
    walk(n.children, level+1);
  });
  walk(tree);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='wbs.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 已匯出（Excel 可直接開啟）');
}

function importJSON() {
  document.getElementById('file-input').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      tree = injectIds(data); // re-assign ids for safety
      collapsed = {};
      render();
      showToast('JSON 已匯入 ✓');
    } catch {
      showToast('匯入失敗：JSON 格式錯誤', true);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Toast ──
let toastTimer;
function showToast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display='none'; }, 2800);
}

// ── Init ──
render();
</script>
</body>
</html>
