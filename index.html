<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBS Builder</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2130;
    --border: #2a3040;
    --border2: #333d55;
    --accent: #4e9af1;
    --accent2: #2d6bc4;
    --green: #3fb68e;
    --red: #e05a5a;
    --yellow: #d4a843;
    --purple: #9b72cf;
    --orange: #d4834a;
    --text: #e2e8f8;
    --muted: #5a6580;
    --muted2: #8892a4;
    --shadow: 0 4px 24px #00000066;

    /* 淺色內容區 */
    --canvas: #f0f3f9;
    --canvas-hover: #e4e9f5;
    --canvas-border: #d8deee;
    --on-canvas: #1a2035;
    --on-canvas-muted: #566480;
    --on-canvas-faint: #9aaac4;
    --canvas-toggle: #cdd5e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── Header ── */
  #header {
    position: sticky; top: 0; z-index: 200;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding-top: 14px; padding-bottom: 14px;
    padding-left: max(24px, calc((100% - 1100px) / 2 + 24px));
    padding-right: max(24px, calc((100% - 1100px) / 2 + 24px));
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
  }
  #header h1 {
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent); flex-shrink: 0;
  }
  #header .subtitle { font-size: 11px; color: var(--muted2); margin-top: 2px; }
  #header-actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; align-items: center; }

  .btn {
    padding: 7px 16px; border-radius: 7px; border: 1px solid transparent;
    cursor: pointer; font-size: 13px; font-weight: 600;
    font-family: inherit; transition: all 0.15s; background: transparent;
    white-space: nowrap;
  }
  .btn-accent { border-color: #4e9af155; color: var(--accent); }
  .btn-accent:hover { background: #4e9af122; }
  .btn-green { border-color: #3fb68e55; color: var(--green); }
  .btn-green:hover { background: #3fb68e22; }
  .btn-muted { border-color: #5a658055; color: var(--muted2); }
  .btn-muted:hover { background: #5a658022; }
  .btn-red { border-color: #e05a5a55; color: var(--red); }
  .btn-red:hover { background: #e05a5a22; }

  /* ── Main ── */
  #main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* ── Tree (淺色卡片) ── */
  #tree {
    min-height: 200px;
    background: var(--canvas);
    border-radius: 14px;
    padding: 8px 6px;
    border: 1px solid var(--canvas-border);
    box-shadow: 0 2px 16px #00000020;
  }
  .empty-state {
    text-align: center; color: var(--on-canvas-muted); margin-top: 60px;
    font-size: 14px; line-height: 2.2;
  }

  /* ── Node ── */
  .node-row {
    display: flex; align-items: center; gap: 8px;
    border-radius: 8px; padding: 7px 12px;
    border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s;
    cursor: grab; user-select: none; position: relative;
    margin-bottom: 3px;
  }
  .node-row:hover { background: var(--canvas-hover); }
  .node-row.drag-over-before { border-left-color: var(--accent) !important; background: #4e9af128; }
  .node-row.drag-over-child  { border-left-color: var(--green)  !important; background: #3fb68e1a; }
  .node-row.dragging { opacity: 0.35; }

  .toggle-btn {
    width: 20px; height: 20px; border-radius: 4px;
    background: transparent; border: none; color: var(--muted);
    font-size: 10px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .toggle-btn { color: var(--on-canvas-muted); }
  .toggle-btn.has-children { background: var(--canvas-toggle); color: var(--on-canvas); }
  .toggle-btn:hover { color: var(--on-canvas); }

  .num-badge {
    font-size: 11px; font-family: 'Courier New', monospace;
    border-radius: 4px; padding: 2px 6px; flex-shrink: 0;
    min-width: 34px; text-align: center;
  }
  .level-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  .node-title {
    flex: 1; font-size: 15px; color: var(--on-canvas);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .node-title[contenteditable="true"] {
    outline: 1px solid var(--accent); border-radius: 4px;
    padding: 2px 8px; background: #fff;
    white-space: nowrap; min-width: 60px;
  }

  .node-meta {
    display: flex; gap: 4px; align-items: center; flex-shrink: 0;
  }
  .meta-field {
    font-size: 12px; color: var(--on-canvas-muted);
    border: 1px solid transparent; border-radius: 4px;
    padding: 3px 8px; cursor: pointer; white-space: nowrap;
    transition: border-color 0.12s; min-width: 52px; text-align: center;
  }
  .meta-field:hover { border-color: var(--canvas-border); background: #fff; }
  .meta-field.empty { color: var(--on-canvas-faint); }
  .meta-field input {
    background: transparent; border: none; outline: none;
    color: var(--on-canvas); font-size: 12px; font-family: inherit;
    text-align: center;
  }
  .meta-sep { font-size: 11px; color: var(--on-canvas-faint); flex-shrink: 0; }

  .node-actions {
    display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s;
  }
  .node-row:hover .node-actions { opacity: 1; }

  .act-btn {
    width: 24px; height: 24px; border-radius: 4px; border: none;
    background: transparent; color: var(--on-canvas-muted);
    font-size: 12px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.1s; font-family: inherit;
  }
  .act-btn:hover { background: rgba(0,0,0,0.07); }
  .act-btn.add:hover { color: var(--green); }
  .act-btn.child:hover { color: var(--accent); }
  .act-btn.del:hover { color: var(--red); }

  /* ── Stats (淺色卡片) ── */
  #stats {
    margin-top: 16px; padding: 14px 22px;
    background: var(--canvas); border-radius: 12px;
    border: 1px solid var(--canvas-border);
    box-shadow: 0 2px 16px #00000020;
    display: flex; gap: 32px; font-size: 13px; color: var(--on-canvas-muted);
  }
  #stats .stat-val { color: var(--on-canvas); font-weight: 700; font-size: 20px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #fff;
    border-radius: 8px; padding: 10px 18px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 20px #00000066;
    z-index: 999; display: none;
    animation: fadeUp 0.2s ease;
  }
  #toast.error { background: var(--red); }

  /* ── Template Panel ── */
  #tpl-panel {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding-top: 14px; padding-bottom: 14px;
    padding-left: max(20px, calc((100% - 1100px) / 2 + 20px));
    padding-right: max(20px, calc((100% - 1100px) / 2 + 20px));
    display: none; gap: 12px; flex-wrap: wrap;
    animation: slideDown 0.2s ease;
  }
  #tpl-panel.open { display: flex; }
  .tpl-card {
    flex: 1; min-width: 180px; max-width: 280px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; padding: 14px 16px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .tpl-card:hover { border-color: var(--accent); background: #4e9af10a; }

  /* ── Animations ── */
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:none } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

  /* ── Toolbar separator ── */
  .sep { width: 1px; background: var(--border); height: 20px; flex-shrink: 0; }

  /* ── Template Panel ─ desktop spacing ── */
  .tpl-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .tpl-card p  { font-size: 12px; color: var(--muted2); line-height: 1.7; }

  /* ════════════════════════════════════════
     手機版 (≤ 640px)
  ════════════════════════════════════════ */
  @media (max-width: 640px) {
    body { font-size: 15px; }

    /* Header 折兩列 */
    #header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    #header h1 { font-size: 16px; }
    #header .subtitle { font-size: 10px; }
    #header-actions { width: 100%; gap: 6px; margin-left: 0; }
    .sep { display: none; }
    .btn { padding: 8px 11px; font-size: 12px; }

    /* 模板面板：卡片單欄 */
    #tpl-panel { padding: 12px 14px; }
    .tpl-card { min-width: 100%; max-width: 100%; }

    /* 主區塊 */
    #main { padding: 14px 10px; }

    /* 節點列：meta 欄位換到第二行 */
    .node-row {
      flex-wrap: wrap;
      padding: 9px 10px;
      min-height: 44px;
      gap: 6px;
    }
    .node-meta {
      order: 10;
      flex-basis: 100%;
      padding: 3px 0 1px 28px;
      gap: 3px;
    }
    /* 動作按鈕在手機上常駐顯示 */
    .node-actions { opacity: 1; }
    .act-btn { width: 28px; height: 28px; font-size: 13px; }

    /* Stats */
    #stats { gap: 18px; padding: 12px 14px; flex-wrap: wrap; }
    #stats .stat-val { font-size: 18px; }

    /* Toast 撐滿底部 */
    #toast { left: 14px; right: 14px; bottom: 14px; text-align: center; }
  }

  /* ── Status Badge ── */
  .status-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    cursor: pointer; flex-shrink: 0; font-weight: 600;
    border: 1px solid transparent; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .status-badge:hover { opacity: 0.7; }
  .status-not-started { color: var(--muted2); border-color: var(--muted2); }
  .status-in-progress { color: var(--yellow); border-color: var(--yellow); }
  .status-done        { color: var(--green);  border-color: var(--green);  }

  /* ── Notes Row ── */
  .node-notes-row { display: none; }
  .node-notes-row.open { display: block; }
  .notes-textarea {
    width: 100%; background: #fff;
    border: 1px solid var(--canvas-border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; color: var(--on-canvas);
    font-family: inherit; resize: vertical; min-height: 52px;
    outline: none; transition: border-color 0.12s; display: block;
  }
  .notes-textarea:focus { border-color: var(--accent); }
  .act-btn.notes.has-notes { color: var(--accent); }

  @media (max-width: 640px) {
    .notes-textarea { font-size: 14px; }
  }

</style>
</head>

let tree = [

let collapsed = {};
let draggingId = null;
let overId = null;
let expandedNotes = {};   // { [nodeId]: boolean }
let dropPosition = null;  // 'before' | 'child'

const STATUS_CYCLE = { 'not-started': 'in-progress', 'in-progress': 'done', 'done': 'not-started' };
const STATUS_LABEL = { 'not-started': '未開始', 'in-progress': '進行中', 'done': '完成' };

function uid() { return Math.random().toString(36).slice(2,9); }

// ── Tree utils ──
function flatten(nodes, parentId=null, level=0) {
  const res = [];
  nodes.forEach((n,i) => {
    res.push({ ...n, parentId, level, hasChildren: n.children.length > 0 });
    if (!collapsed[n.id]) res.push(...flatten(n.children, n.id, level+1));
  });
  return res;
}

function allFlat(nodes, level=0) {
  const res = [];
  nodes.forEach(n => {
    res.push({ ...n, level });
    res.push(...allFlat(n.children, level+1));
  });
  return res;
}

function numbering(nodes, prefix='') {
  const map = {};
  nodes.forEach((n,i) => {
    const num = prefix ? `${prefix}.${i+1}` : `${i+1}`;
    map[n.id] = num;
    Object.assign(map, numbering(n.children, num));
  });
  return map;
}

function findNode(nodes, id) {
  for (const n of nodes) {
    if (n.id === id) return n;
    const found = findNode(n.children, id);
    if (found) return found;
  }
  return null;
}

function removeNode(nodes, id) {
  let removed = null;
  const filter = arr => arr.reduce((acc, n) => {
    if (n.id === id) { removed = JSON.parse(JSON.stringify(n)); return acc; }
    acc.push({ ...n, children: filter(n.children) });
    return acc;
  }, []);
  return [filter(nodes), removed];
}

function insertAfter(nodes, targetId, newNode) {
  return nodes.reduce((acc, n) => {
    acc.push({ ...n, children: insertAfter(n.children, targetId, newNode) });
    if (n.id === targetId) acc.push(newNode);
    return acc;
  }, []);
}

function addChildTo(nodes, parentId, newNode) {
  return nodes.map(n => {
    if (n.id === parentId) return { ...n, children: [...n.children, newNode] };
    return { ...n, children: addChildTo(n.children, parentId, newNode) };
  });
}

function updateNodeTitle(nodes, id, title) {
  return nodes.map(n => {
    if (n.id === id) return { ...n, title };
    return { ...n, children: updateNodeTitle(n.children, id, title) };
  });
}

function updateNodeField(nodes, id, field, value) {
  return nodes.map(n => {
    if (n.id === id) return { ...n, [field]: value };
    return { ...n, children: updateNodeField(n.children, id, field, value) };
  });
}

function insertBefore(nodes, targetId, newNode) {
  return nodes.reduce((acc, n) => {
    if (n.id === targetId) acc.push(newNode);
    acc.push({ ...n, children: insertBefore(n.children, targetId, newNode) });
    return acc;
  }, []);
}

function isDescendant(nodes, ancestorId, targetId) {
  const anc = findNode(nodes, ancestorId);
  if (!anc) return false;
  return !!findNode(anc.children, targetId);
}

function getNodeDepth(nodes, id, depth=0) {
  for (const n of nodes) {
    if (n.id === id) return depth;
    const d = getNodeDepth(n.children, id, depth+1);
    if (d !== -1) return d;
  }
  return -1;
}

function subtreeDepth(node) {
  if (!node.children.length) return 0;
  return 1 + Math.max(...node.children.map(subtreeDepth));
}

// ── Render ──
function render() {
  const nums = numbering(tree);
  const all = allFlat(tree);
  const vis = flatten(tree);
  const treeEl = document.getElementById('tree');

  if (all.length === 0) {
    treeEl.innerHTML = '<div class="empty-state">尚無工作項目<br>點擊「新增群組」或套用模板開始</div>';
  } else {
    treeEl.innerHTML = '';
    vis.forEach(node => {
      const col = LEVEL_COLORS[node.level % LEVEL_COLORS.length];
      const row = document.createElement('div');
      row.className = 'node-row';
      row.dataset.id = node.id;
      row.style.paddingLeft = (24 + node.level * 26) + 'px';
      row.style.borderLeftColor = 'transparent';
      row.draggable = true;

      // Toggle
      const tog = document.createElement('button');
      tog.className = 'toggle-btn' + (node.hasChildren ? ' has-children' : '');
      tog.textContent = node.hasChildren ? (collapsed[node.id] ? '▶' : '▼') : '';
      tog.onclick = e => { e.stopPropagation(); collapsed[node.id] = !collapsed[node.id]; render(); };
      row.appendChild(tog);

      // Number
      const badge = document.createElement('span');
      badge.className = 'num-badge';
      badge.textContent = nums[node.id] || '';
      badge.style.color = col;
      badge.style.background = col + '18';
      row.appendChild(badge);

      // Dot
      const dot = document.createElement('span');
      dot.className = 'level-dot';
      dot.style.background = col;
      dot.style.boxShadow = `0 0 6px ${col}88`;
      row.appendChild(dot);

      // Status badge
      const status = node.status || 'not-started';
      const sBadge = document.createElement('span');
      sBadge.className = `status-badge status-${status}`;
      sBadge.textContent = STATUS_LABEL[status];
      sBadge.onclick = e => { e.stopPropagation(); cycleStatus(node.id, status); };
      row.appendChild(sBadge);

      // Title
      const title = document.createElement('span');
      title.className = 'node-title';
      title.textContent = node.title;
      title.title = '雙擊編輯';
      title.ondblclick = e => { e.stopPropagation(); startEdit(node.id, title); };
      row.appendChild(title);

      // Meta fields (時間起訖 + 負責人)
      const meta = document.createElement('div');
      meta.className = 'node-meta';

      const mkMeta = (field, placeholder, width) => {
        const isDate = field === 'startDate' || field === 'endDate';
        const el = document.createElement('span');
        el.className = 'meta-field' + (node[field] ? '' : ' empty');
        el.textContent = node[field] ? (isDate ? '📅 ' + node[field] : node[field]) : placeholder;
        el.style.minWidth = width;
        el.onclick = e => { e.stopPropagation(); startMetaEdit(node.id, field, el, placeholder); };
        return el;
      };

      meta.appendChild(mkMeta('startDate', '📅 開始', '82px'));
      meta.appendChild(document.createTextNode(' ~ '));
      meta.appendChild(mkMeta('endDate', '📅 結束', '82px'));
      const metaSep = document.createElement('span');
      metaSep.className = 'meta-sep';
      metaSep.textContent = '|';
      meta.appendChild(metaSep);
      meta.appendChild(mkMeta('owner', '負責人', '60px'));
      row.appendChild(meta);

      // Actions
      const acts = document.createElement('div');
      acts.className = 'node-actions';

      const mkBtn = (label, cls, tip, fn) => {
        const b = document.createElement('button');
        b.className = `act-btn ${cls}`;
        b.textContent = label;
        b.title = tip;
        b.onclick = e => { e.stopPropagation(); fn(); };
        return b;
      };

      acts.appendChild(mkBtn('＋','add','新增同層', () => addSibling(node.id)));
      if (node.level < 4) acts.appendChild(mkBtn('⤵','child','新增子項', () => addChildNode(node.id)));
      const hasNotes = !!(node.notes && node.notes.trim());
      acts.appendChild(mkBtn('💬', 'notes' + (hasNotes ? ' has-notes' : ''), '備註', () => {
        expandedNotes[node.id] = !expandedNotes[node.id];
        const nr = document.querySelector(`.node-notes-row[data-id="${node.id}"]`);
        if (nr) nr.classList.toggle('open', !!expandedNotes[node.id]);
      }));
      acts.appendChild(mkBtn('✕','del','刪除', () => deleteNode(node.id)));
      row.appendChild(acts);

      // Drag events
      row.addEventListener('dragstart', e => {
        draggingId = node.id;
        setTimeout(() => row.classList.add('dragging'), 0);
      });
      row.addEventListener('dragend', () => {
        draggingId = null; overId = null; dropPosition = null;
        document.querySelectorAll('.drag-over-before,.drag-over-child,.dragging').forEach(el => {
          el.classList.remove('drag-over-before','drag-over-child','dragging');
        });
      });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        if (draggingId === node.id) return;
        document.querySelectorAll('.drag-over-before,.drag-over-child').forEach(el => {
          el.classList.remove('drag-over-before','drag-over-child');
        });
        const rect = row.getBoundingClientRect();
        dropPosition = e.clientY >= rect.top + rect.height * 0.5 ? 'child' : 'before';
        row.classList.add(dropPosition === 'child' ? 'drag-over-child' : 'drag-over-before');
        overId = node.id;
      });
      row.addEventListener('drop', e => {
        e.preventDefault();
        if (!draggingId || draggingId === node.id) return;
        if (isDescendant(tree, draggingId, node.id)) {
          showToast('無法拖曳到自身的子節點', true);
          draggingId = null; overId = null; dropPosition = null;
          return;
        }
        const [without, moved] = removeNode(tree, draggingId);
        if (!moved) { draggingId = null; overId = null; dropPosition = null; return; }
        const targetDepth = getNodeDepth(without, node.id);
        const newDepth = dropPosition === 'child' ? targetDepth + 1 : targetDepth;
        if (newDepth + subtreeDepth(moved) > 4) {
          showToast('已達最大層級（5 層）', true);
          draggingId = null; overId = null; dropPosition = null;
          return;
        }
        if (dropPosition === 'child') {
          tree = addChildTo(without, node.id, moved);
          collapsed[node.id] = false;
        } else {
          tree = insertBefore(without, node.id, moved);
        }
        draggingId = null; overId = null; dropPosition = null;
        render();
      });

      treeEl.appendChild(row);

      // Notes row（備註展開列，每次 render 重建，展開狀態由 expandedNotes 決定）
      const notesRow = document.createElement('div');
      notesRow.className = 'node-notes-row' + (expandedNotes[node.id] ? ' open' : '');
      notesRow.dataset.id = node.id;
      notesRow.style.paddingLeft = (24 + node.level * 26 + 28) + 'px';
      notesRow.style.paddingRight = '12px';
      notesRow.style.paddingBottom = '6px';
      const ta = document.createElement('textarea');
      ta.className = 'notes-textarea';
      ta.placeholder = '新增備註…';
      ta.value = node.notes || '';
      ta.rows = 2;
      ta.addEventListener('blur', () => {
        const val = ta.value.trim();
        tree = updateNodeField(tree, node.id, 'notes', val);
        const btn = ta.closest('.node-notes-row')?.previousElementSibling?.querySelector('.act-btn.notes');
        if (btn) btn.className = `act-btn notes${val ? ' has-notes' : ''}`;
      });
      ta.addEventListener('click', e => e.stopPropagation());
      ta.addEventListener('dragstart', e => e.stopPropagation());
      notesRow.appendChild(ta);
      treeEl.appendChild(notesRow);
    });
  }

  // Stats
  const allNodes = allFlat(tree);
  document.getElementById('s-total').textContent = allNodes.length;
  document.getElementById('s-roots').textContent = tree.length;
  const maxDepth = allNodes.length ? Math.max(...allNodes.map(n => n.level)) + 1 : 0;
  document.getElementById('s-depth').textContent = maxDepth;
}

// ── Status ──
function cycleStatus(id, current) {
  tree = updateNodeField(tree, id, 'status', STATUS_CYCLE[current] || 'not-started');
  render();
}

// ── Edit ──
function startMetaEdit(id, field, el, placeholder) {
  const isDate = field === 'startDate' || field === 'endDate';
  const rawText = el.textContent;
  const prev = rawText === placeholder ? '' : rawText.replace('📅 ', '');

  el.classList.remove('empty');
  el.innerHTML = '';

  if (isDate) {
    const inp = document.createElement('input');
    inp.type = 'date';
    if (prev) {
      const [m, d] = prev.split('/');
      const y = new Date().getFullYear();
      if (m && d) inp.value = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    inp.style.cssText = 'background:transparent;border:none;outline:none;color:var(--on-canvas);font-size:12px;font-family:inherit;width:130px;text-align:center;cursor:pointer;';
    el.appendChild(inp);

    let committed = false;
    inp.addEventListener('change', () => {
      committed = true;
      const val = inp.value;
      if (val) {
        const [, m, d] = val.split('-');
        const display = `${m}/${d}`;
        tree = updateNodeField(tree, id, field, display);
        el.textContent = '📅 ' + display;
        el.className = 'meta-field';
      } else {
        tree = updateNodeField(tree, id, field, '');
        el.textContent = placeholder;
        el.className = 'meta-field empty';
      }
      inp.blur();
    });
    inp.addEventListener('blur', () => {
      if (!committed) {
        el.textContent = prev ? '📅 ' + prev : placeholder;
        el.className = 'meta-field' + (prev ? '' : ' empty');
      }
    });

    inp.focus();
    try { setTimeout(() => inp.showPicker(), 50); } catch(e) {}
    return;
  }

  // 負責人：純文字編輯
  const inp = document.createElement('input');
  inp.value = prev;
  inp.placeholder = placeholder;
  inp.style.cssText = 'background:transparent;border:none;outline:none;color:var(--on-canvas);font-size:12px;font-family:inherit;width:90px;text-align:center;';
  el.appendChild(inp);
  inp.focus();
  inp.select();
  const commit = () => {
    const val = inp.value.trim();
    tree = updateNodeField(tree, id, field, val);
    el.textContent = val || placeholder;
    el.className = 'meta-field' + (val ? '' : ' empty');
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = prev; inp.blur(); }
  });
}

function startEdit(id, titleEl) {
  titleEl.contentEditable = 'true';
  titleEl.focus();
  // select all
  const range = document.createRange();
  range.selectNodeContents(titleEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  const commit = () => {
    titleEl.contentEditable = 'false';
    const val = titleEl.textContent.trim();
    if (val) tree = updateNodeTitle(tree, id, val);
    else { const n = findNode(tree, id); if (n) titleEl.textContent = n.title; }
    titleEl.removeEventListener('blur', commit);
    titleEl.removeEventListener('keydown', onKey);
  };
  const onKey = e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { titleEl.contentEditable='false'; const n=findNode(tree,id); if(n) titleEl.textContent=n.title; }
  };
  titleEl.addEventListener('blur', commit);
  titleEl.addEventListener('keydown', onKey);
}

// ── Templates ──
function toggleTpl() {
  document.getElementById('tpl-panel').classList.toggle('open');
}

function applyTemplate(key) {
  if (!confirm('套用模板將取代現有 WBS，確定繼續？')) return;
  tree = injectIds(TEMPLATES[key]);
  collapsed = {};
  expandedNotes = {};
  document.getElementById('tpl-panel').classList.remove('open');
  render();
  showToast('模板已套用 ✓');
}

// ── CRUD ──
function addRoot() {
  tree.push({ id: uid(), title: '新工作群組', children: [], status: 'not-started', notes: '' });
  render();
}

function addSibling(id) {
  tree = insertAfter(tree, id, { id: uid(), title: '新工作項目', children: [], status: 'not-started', notes: '' });
  render();
}

function addChildNode(parentId) {
  tree = addChildTo(tree, parentId, { id: uid(), title: '新子項目', children: [], status: 'not-started', notes: '' });
  collapsed[parentId] = false;
  render();
}

function deleteNode(id) {
  const [nt] = removeNode(tree, id);
  tree = nt;
  delete expandedNotes[id];
  render();
}

function injectIds(nodes, level=0) {
  return (nodes||[]).map(n => ({
    id: uid(), title: n.title || '未命名',
    owner: n.owner || '', startDate: n.startDate || '', endDate: n.endDate || '',
    status: n.status || 'not-started',
    notes: n.notes || '',
    children: injectIds(n.children, level+1)
  }));
}

// ── Export ──
function exportJSON() {
  const blob = new Blob([JSON.stringify(tree, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='wbs.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('JSON 已匯出');
}

function exportCSV() {
  const nums = numbering(tree);
  const rows = [['編號','層級','工作項目','負責人','開始日期','結束日期','狀態']];
  const walk = (nodes, level=0) => nodes.forEach(n => {
    rows.push([nums[n.id], level+1, n.title, n.owner||'', n.startDate||'', n.endDate||'', STATUS_LABEL[n.status||'not-started']]);
    walk(n.children, level+1);
  });
  walk(tree);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='wbs.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 已匯出（Excel 可直接開啟）');
}

function importJSON() {
  document.getElementById('file-input').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      tree = injectIds(data);
      collapsed = {};
      expandedNotes = {};
      render();
      showToast('JSON 已匯入 ✓');
    } catch {
      showToast('匯入失敗：JSON 格式錯誤', true);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Toast ──
let toastTimer;
function showToast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display='none'; }, 2800);
}

// ── Init ──
render();
</script>
</body>
